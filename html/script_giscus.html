<script>
  // 사용자의 다크 모드 설정을 감지하는 함수
  function getPreferredTheme() {
    return window.matchMedia &&
      window.matchMedia("(prefers-color-scheme: dark)").matches
      ? "dark"
      : "light";
  }

  // Giscus 스크립트를 동적으로 생성하는 함수
  function loadGiscus() {
    const theme = getPreferredTheme();
    const script = document.createElement("script");

    script.src = "https://giscus.app/client.js";
    script.setAttribute("data-repo", "yanguk/yanguk.github.io");
    script.setAttribute("data-repo-id", "R_kgDONvaxZw");
    script.setAttribute("data-category", "Announcements");
    script.setAttribute("data-category-id", "DIC_kwDONvaxZ84Cm-yk");
    script.setAttribute("data-mapping", "pathname");
    script.setAttribute("data-strict", "1");
    script.setAttribute("data-reactions-enabled", "1");
    script.setAttribute("data-emit-metadata", "0");
    script.setAttribute("data-input-position", "bottom");
    script.setAttribute("data-theme", theme); // 다크 모드에 따라 테마 설정
    script.setAttribute("data-lang", "en");
    script.setAttribute("crossorigin", "anonymous");
    script.async = true;

    document.body.appendChild(script);
  }

  // 페이지가 로드될 때 Giscus 스크립트를 로드
  window.onload = loadGiscus;
</script>
